      { name: "Центральный городской парк", description: "Огромный зелёный оазис с озёрами, аллеями и смотровыми площадками.", img: "https://images.unsplash.com/photo-1571008887538-b36bb32f4571?auto=format&fit=crop&w=600&q=80", duration: "1.5–2 часа", rating: 4.6, district: "Район у главного парка" },
      { name: "Смотровая башня «Небесное око»", description: "Панорамный вид на весь мегаполис с высоты 300 метров.", img: "https://images.unsplash.com/photo-1512453979798-5ea266f8880c?auto=format&fit=crop&w=600&q=80", duration: "1 час", rating: 4.7, district: "Деловой квартал (Сити)" },

      { name: "Аквариум морских глубин", description: "Подводный тоннель с акулами, скатами и тысячами тропических рыб.", img: "https://images.unsplash.com/photo-1535591273668-578e31182c4f?auto=format&fit=crop&w=600&q=80", duration: "2 часа", rating: 4.6, district: "Прибрежная курортная зона" },
      { name: "Королевский дворец", description: "Действующая резиденция с экскурсиями по парадным залам.", img: "https://images.unsplash.com/photo-1599420187287-458c7cb2d5e1?auto=format&fit=crop&w=600&q=80", duration: "2–3 часа", rating: 4.8, district: "Премиальный загородный комплекс" },
      { name: "Ночной рынок тысячи огней", description: "Гастрономический рай с местной кухней и сувенирами.", img: "https://images.unsplash.com/photo-1533900298318-6b8da08a523e?auto=format&fit=crop&w=600&q=80", duration: "2–3 часа", rating: 4.2, district: "Культурно-туристический центр" }
    ];

    const FOOD_MENU_OPTIONS = {
      mains: [
        { id: "m1", name: "Куриное филе-гриль под соусом", type: "Мясо/Птица", img: "https://images.unsplash.com/photo-1604503468506-a8da13d82791?auto=format&fit=crop&w=300&q=80" },
        { id: "m2", name: "Стейк из запечённого лосося", type: "Рыба", img: "https://images.unsplash.com/photo-1467003909585-2f8a72700288?auto=format&fit=crop&w=300&q=80" },
        { id: "m3", name: "Нежные митболы из говядины", type: "Мясо", img: "https://images.unsplash.com/photo-1529042410759-befb1204b468?auto=format&fit=crop&w=300&q=80" },
        { id: "m4", name: "Средиземноморские овощи-гриль", type: "Вегетарианское", img: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?auto=format&fit=crop&w=300&q=80" }
      ],
      sides: [
        { id: "s1", name: "Пряный рассыпчатый рис", img: "https://images.unsplash.com/photo-1541832676-9b763b0239ab?auto=format&fit=crop&w=300&q=80" },
        { id: "s2", name: "Золотистые картофельные дольки", img: "https://images.unsplash.com/photo-1573080496219-bb080dd4f877?auto=format&fit=crop&w=300&q=80" }
      ],

        { id: "d2", name: "Освежающий апельсиновый сок", img: "https://images.unsplash.com/photo-1621506289937-a8e4df240d0b?auto=format&fit=crop&w=300&q=80" }
      ],
      desserts: [

        { id: "de2", name: "Шоколадный мини-чизкейк", img: "https://images.unsplash.com/photo-1606313564200-e75d5e30476c?auto=format&fit=crop&w=300&q=80" }
      ]

    const AIRLINES = ["SkyGen Airlines", "Oceanic Air", "Global Jet", "AeroNomad"];

    // === ИКОНКИ ===
    const IconPlane = () => <svg className="w-6 h-6 inline" fill="currentColor" viewBox="0 0 24 24"><path d="M21 16V14L13 9V3.5A1.5 1.5 0 0 0 11.5 2A1.5 1.5 0 0 0 10 3.5V9L2 14V16L10 13.5V19L8 20.5V22L11.5 21L15 22V20.5L13 19V13.5L21 16Z"/></svg>;
    const IconArrow = () => <svg className="w-5 h-5 inline text-gray-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>;
    const IconTicket = () => <svg className="w-6 h-6 inline" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>;
    const IconBriefcase = () => <svg className="w-5 h-5 inline" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>;
    const IconTrash = () => <svg className="w-5 h-5 inline text-red-400 hover:text-red-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>;
    const IconHotel = () => <svg className="w-5 h-5 inline" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>;
    const IconCloud = () => <svg className="w-4 h-4 inline text-blue-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"/></svg>;
    const IconClock = () => <svg className="w-4 h-4 inline text-amber-500" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>;
    const IconAttraction = () => <svg className="w-5 h-5 inline" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path strokeLinecap="round" strokeLinejoin="round" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>;

    // === ГЕНЕРАТОР РЕЙСОВ ===
    const generateFlights = (fromCode, toCode, dateFrom, dateTo, count = 6) => {
      return Array.from({ length: count }).map(() => {
        const durationHours = Math.floor(Math.random() * 8) + 2;
        const durationMins = Math.floor(Math.random() * 60);
        const depHour = Math.floor(Math.random() * 16) + 4;
        const arrHour = (depHour + durationHours) % 24;
        
        return {
          id: Math.random().toString(36).substr(2, 8).toUpperCase(),
          airline: AIRLINES[Math.floor(Math.random() * AIRLINES.length)],
          flightNumber: `SG-${Math.floor(Math.random() * 9000) + 1000}`,
          departure: `${depHour.toString().padStart(2, '0')}:${durationMins.toString().padStart(2, '0')}`,
          arrival: `${arrHour.toString().padStart(2, '0')}:45`,
          duration: `${durationHours}ч ${durationMins}м`,
          price: Math.floor(Math.random() * 45000) + 12000,
          from: fromCode,
          to: toCode,
          dateFrom: dateFrom,
          dateTo: dateTo,
          gate: `G${Math.floor(Math.random() * 50) + 1}`,
          hasFood: Math.random() > 0.35
        };
      });
    };

    // === КОМПОНЕНТ QR-КОДА ===
    const QRCodeBlock = ({ text }) => {
      const qrRef = React.useRef(null);
      React.useEffect(() => {
        qrRef.current.innerHTML = ""; 
        new QRCode(qrRef.current, {
          text: text,
          width: 80,
          height: 80,
          colorDark: "#1e293b", 
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.L
        });
      }, [text]);
      return <div ref={qrRef} className="p-1.5 bg-white border rounded-lg shadow-sm"></div>;
    };

    // === ГЛАВНЫЙ КОМПОНЕНТ ПРИЛОЖЕНИЯ ===
    function App() {
      const [step, setStep] = React.useState('search'); 
      const [isSearchOpen, setIsSearchOpen] = React.useState(true);
      const [sortBy, setSortBy] = React.useState('cheap'); 
      const [citySortType, setCitySortType] = React.useState('city'); 
      const [cityCards, setCityCards] = React.useState([]);

      const [params, setParams] = React.useState(() => ({
        from: localStorage.getItem('skygen_home_city') || 'SVO',
        to: 'KUL',
        dateFrom: new Date().toISOString().split('T')[0],
        dateTo: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
        passengers: 1, flightClass: 'Эконом', baggage: true, pet: false
      }));

      const handleFromCityChange = (e) => {
        const selectedCode = e.target.value;
        localStorage.setItem('skygen_home_city', selectedCode); 
        setParams(prev => ({ ...prev, from: selectedCode }));
      };
      
      const [flights, setFlights] = React.useState([]);
      const [selectedFlight, setSelectedFlight] = React.useState(null);
      
      const [currentHotelsList, setCurrentHotelsList] = React.useState([]);
      const [selectedHotel, setSelectedHotel] = React.useState(null);

      const [currentAttractionsList, setCurrentAttractionsList] = React.useState([]);
      const [selectedAttraction, setSelectedAttraction] = React.useState(null);

      const [selectedFoodMenu, setSelectedFoodMenu] = React.useState({
        main: FOOD_MENU_OPTIONS.mains[0],
        side: FOOD_MENU_OPTIONS.sides[0],
        drink: FOOD_MENU_OPTIONS.drinks[0],
        dessert: FOOD_MENU_OPTIONS.desserts[0]
      });
      const [isFoodSkipped, setIsFoodSkipped] = React.useState(false);
      
      const [occupiedSeats, setOccupiedSeats] = React.useState([]);
      const [chosenSeats, setChosenSeats] = React.useState([]); 
      
      const [passengerNames, setPassengerNames] = React.useState(['NYASHIK']);

      const [trips, setTrips] = React.useState(() => {
        const saved = localStorage.getItem('skygen_trips');
        return saved ? JSON.parse(saved) : [];
      });

      const ticketRef = React.useRef(null);

      // Генерация интерактивных карточек популярных городов
      React.useEffect(() => {
        const selectedForCards = [...CITIES].sort(() => 0.5 - Math.random()).slice(0, 8);
        const generatedCards = selectedForCards.map(cityObj => {
          const mockFlight = generateFlights("SVO", cityObj.code, params.dateFrom, params.dateTo, 1)[0];
          return {
            ...cityObj,
            price: mockFlight.price,
            flight: mockFlight
          };
        });
        setCityCards(generatedCards);
      }, []);

      React.useEffect(() => {
        const count = Number(params.passengers);
        if (count < 1) return;
        setPassengerNames(prev => {
          const next = [...prev];
          if (next.length < count) {
            for (let i = next.length; i < count; i++) next.push(`PASSENGER ${i + 1}`);
          } else if (next.length > count) {
            return next.slice(0, count);
          }
          return next;
        });
      }, [params.passengers]);

      const handleDateFromChange = (e) => {
        const newDateFrom = e.target.value;
        let newDateTo = params.dateTo;
        if (new Date(newDateFrom) > new Date(newDateTo)) newDateTo = newDateFrom;
        setParams({ ...params, dateFrom: newDateFrom, dateTo: newDateTo });
      };

      const handlePassengersChange = (e) => {
        const valStr = e.target.value;
        if (valStr === '') {
          setParams({ ...params, passengers: 0 });
          return;
        }
        let val = Math.floor(Number(valStr));
        if (val > 5) val = 5; 
        setParams({ ...params, passengers: val });
      };

      const handleSearch = (e) => {
        if(e) e.preventDefault();
        if (params.passengers < 1) {
          alert("Укажите хотя бы 1 пассажира!");
          return;
        }
        if (params.from === params.to) {
          alert("Выберите разные города!");
          return;
        }
        if (new Date(params.dateTo) < new Date(params.dateFrom)) {
          alert("Дата обратно не может быть раньше даты вылета!");
          return;
        }
        setFlights(generateFlights(params.from, params.to, params.dateFrom, params.dateTo, 6));
        setStep('results');
      };

      const selectCityCard = (targetCode) => {
        if(params.from === targetCode) {
          alert("Этот город уже выбран как пункт отправления. Выберите другой город!");
          return;
        }
        const updatedParams = { ...params, to: targetCode };
        setParams(updatedParams);
        
        setTimeout(() => {
          setFlights(generateFlights(params.from, targetCode, params.dateFrom, params.dateTo, 6));
          setStep('results');
        }, 100);
      };

      const goToSeatSelection = (flight) => {
        setSelectedFlight(flight);
        setSelectedHotel(null);
        setSelectedAttraction(null);
        setChosenSeats([]); 
        setIsFoodSkipped(false);
        
        const occupied = [];
        const rows = 12;
        const cols = ['A','B','C','D','E','F'];
        for (let r = 1; r <= rows; r++) {
          cols.forEach(c => {
            if (Math.random() < 0.4) occupied.push(`${r}${c}`);
          });
        }
        setOccupiedSeats(occupied);
        setStep('seats');
      };

      const handleOpenHotelsStep = () => {
        if (chosenSeats.length !== Number(params.passengers)) {
          alert(`Выберите ровно столько мест, сколько пассажиров (${params.passengers} шт.)`);
          return;
        }

        const targetCityObj = CITIES.find(c => c.code === params.to) || { hotelCount: 3 };
        const requiredCount = targetCityObj.hotelCount;

        const shuffledNames = [...HOTEL_NAMES_POOL].sort(() => 0.5 - Math.random());
        const shuffledDistricts = [...HOTEL_DISTRICTS_POOL].sort(() => 0.5 - Math.random());

        const generatedHotels = Array.from({ length: requiredCount }).map((_, i) => {
          const hotelTemplate = shuffledNames[i % shuffledNames.length];
          const randomPriceOffset = Math.floor((Math.random() - 0.5) * 2000); 

          return {
            name: hotelTemplate.name,
            stars: hotelTemplate.stars,
            price: Math.max(3000, hotelTemplate.price + randomPriceOffset),
            img: hotelTemplate.img, 
            district: shuffledDistricts[i % shuffledDistricts.length]
          };
        });

        setCurrentHotelsList(generatedHotels);
        setStep('hotels');
      };

      const handleOpenAttractionsStep = (hotelObj = null) => {
        if (hotelObj) {
          setSelectedHotel({ ...hotelObj, totalTripPrice: hotelObj.price * params.passengers });
        } else {
          setSelectedHotel(null);
        }

        const targetCityObj = CITIES.find(c => c.code === params.to) || { attractionCount: 3 };
        const requiredCount = targetCityObj.attractionCount;

        const shuffledAttractions = [...ATTRACTIONS_POOL].sort(() => 0.5 - Math.random());

        const generatedAttractions = Array.from({ length: requiredCount }).map((_, i) => {
          const attrTemplate = shuffledAttractions[i % shuffledAttractions.length];
          return { ...attrTemplate };
        });

        setCurrentAttractionsList(generatedAttractions);
        setStep('attractions');
      };

      const handleNextAfterAttractions = (attractionObj = null) => {
        if (attractionObj) {
          setSelectedAttraction(attractionObj);
        } else {
          setSelectedAttraction(null);
        }

        if (selectedFlight.hasFood) {
          setStep('food');
        } else {
          setStep('ticket');
        }
      };

      const handleSeatClick = (seatId, isBusinessRow) => {
        if (isBusinessRow && params.flightClass !== 'Бизнес') {
          alert("Эти места доступны только для Бизнес-класса!");
          return;
        }

        if (chosenSeats.includes(seatId)) {
          setChosenSeats(chosenSeats.filter(s => s !== seatId));
        } else {
          if (chosenSeats.length >= Number(params.passengers)) {
            alert(`Вы выбрали максимальное количество мест для ${params.passengers} пасс.`);
            return;
          }
          setChosenSeats([...chosenSeats, seatId]);
        }
      };

      const handleNameChange = (index, value) => {
        const updatedNames = [...passengerNames];
        updatedNames[index] = value.toUpperCase();
        setPassengerNames(updatedNames);
      };

      const handleDownloadTicket = async () => {
        if (!ticketRef.current) return;
        const canvas = await html2canvas(ticketRef.current, { scale: 2 });
        const link = document.createElement('a');
        link.download = `SkyGen_Trip_${selectedFlight.flightNumber}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      const saveToMyTrips = () => {
        const tripId = selectedFlight.id + chosenSeats.join('-');
        if (trips.some(t => t.tripId === tripId)) {
          alert("Этот билет уже сохранён в Мои поездки!");
          return;
        }
        const newTrip = {
          tripId,
          flight: selectedFlight,
          hotel: selectedHotel,
          attraction: selectedAttraction,
          foodMenu: (selectedFlight.hasFood && !isFoodSkipped) ? selectedFoodMenu : null,
          seats: chosenSeats,
          passengers: passengerNames,
          class: params.flightClass,
          options: { baggage: params.baggage, pet: params.pet }
        };
        const updatedTrips = [newTrip, ...trips];
        setTrips(updatedTrips);
        localStorage.setItem('skygen_trips', JSON.stringify(updatedTrips));
        alert("Успешно добавлено в 'Мои поездки'!");
      };

      const deleteTrip = (e, tripId) => {
        e.stopPropagation();
        const updated = trips.filter(t => t.tripId !== tripId);
        setTrips(updated);
        localStorage.setItem('skygen_trips', JSON.stringify(updated));
      };

      // Сортировка рейсов: цена + питание
      const sortedFlights = [...flights].sort((a, b) => {
        if (sortBy === 'cheap') return a.price - b.price;
        if (sortBy === 'expensive') return b.price - a.price;
        if (sortBy === 'foodFirst') return (b.hasFood ? 1 : 0) - (a.hasFood ? 1 : 0);
        if (sortBy === 'noFoodFirst') return (a.hasFood ? 1 : 0) - (b.hasFood ? 1 : 0);
        return a.price - b.price;
      });

      const isAllSeatsSelected = chosenSeats.length === Number(params.passengers) && params.passengers > 0;

      const getCityInfo = (code) => {
        return CITIES.find(c => c.code === code) || { city: code, country: "", timezone: "", weather: "", hotelCount: 0, attractionCount: 0 };
      };

      const getSortedCitiesList = () => {
        return [...CITIES].sort((a, b) => {
          if (citySortType === 'city') {
            return a.city.localeCompare(b.city, 'ru');
          } else if (citySortType === 'country') {
            return a.country.localeCompare(b.country, 'ru') || a.city.localeCompare(b.city, 'ru');
          } else if (citySortType === 'hotelsDesc') {
            return b.hotelCount - a.hotelCount || a.city.localeCompare(b.city, 'ru');
          } else if (citySortType === 'hotelsAsc') {
            return a.hotelCount - b.hotelCount || a.city.localeCompare(b.city, 'ru');
          } else if (citySortType === 'attractionsDesc') {
            return b.attractionCount - a.attractionCount || a.city.localeCompare(b.city, 'ru');
          } else if (citySortType === 'attractionsAsc') {
            return a.attractionCount - b.attractionCount || a.city.localeCompare(b.city, 'ru');
          }
          return a.city.localeCompare(b.city, 'ru');
        });
      };

      const StepIndicator = () => {
        if (step === 'search' || step === 'trips') return null;
        
        const stepsList = [
          { key: 'results', label: 'Выбор рейса' },
          { key: 'seats', label: 'Места' },
          { key: 'hotels', label: 'Отель' },
          { key: 'attractions', label: 'Достоприм.' },
          ...(selectedFlight?.hasFood ? [{ key: 'food', label: 'Питание' }] : []),
          { key: 'ticket', label: 'Билет' }
        ];

        return (

                            </span>
                            {trip.hotel && (
                              <span className="text-[11px] bg-green-50 text-green-700 px-2 py-0.5 rounded-md font-bold flex items-center gap-0.5">
                                🏨 {trip.hotel.name}
                              </span>
                            )}
                            {trip.attraction && (
                              <span className="text-[11px] bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-md font-bold flex items-center gap-0.5">
                                🏛 {trip.attraction.name}
                              </span>
                            )}
                            {trip.flight.hasFood ? (
                              trip.foodMenu ? (
                                <span className="text-[11px] bg-orange-50 text-orange-700 px-2 py-0.5 rounded-md font-bold">
                                  🍱 {trip.foodMenu.main.name}
                                </span>
                              ) : (
                                <span className="text-[11px] bg-gray-100 text-gray-400 px-2 py-0.5 rounded-md font-bold">
                                  🍱 Питание пропущено
                                </span>
                              )
                            ) : (
                              <span className="text-[11px] bg-gray-100 text-gray-400 px-2 py-0.5 rounded-md font-bold">
                                🚫 Без питания
                              </span>
                            )}
                          </div>
                          
                          <p className="text-[10px] text-gray-400 truncate pt-1 font-semibold font-mono">
                            Пассажиры: {trip.passengers.join(', ')}
                          </p>
                        </div>

                        <button onClick={(e) => deleteTrip(e, trip.tripId)} className="p-2 opacity-40 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-all">
                          <IconTrash />
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
