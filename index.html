<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKYGEN — Панель бронирования & Отели</title>
  
  <!-- Подключаем Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Подключаем React, ReactDOM и Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Библиотека для скачивания билета в галерею -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <!-- Библиотека для генерации настоящих QR-кодов -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <style>
    .hide-scrollbar::-webkit-scrollbar { display: none; }
    .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
  </style>
</head>
<body class="bg-gray-50 text-slate-800 font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    
    // === БАЗА ГОРОДОВ (40 МЕГАПОЛИСОВ) ===
    const CITIES = [
      { city: "Москва", code: "SVO" }, { city: "Владивосток", code: "VVO" },
      { city: "Шанхай", code: "PVG" }, { city: "Сочи", code: "AER" },
      { city: "Санкт-Петербург", code: "LED" }, { city: "Новосибирск", code: "OVB" },
      { city: "Екатеринбург", code: "SVX" }, { city: "Казань", code: "KZN" },
      { city: "Ташкент", code: "TAS" }, { city: "Астана", code: "NQZ" },
      { city: "Дубай", code: "DXB" }, { city: "Нью-Йорк", code: "JFK" }, 
      { city: "Лондон", code: "LHR" }, { city: "Токио", code: "HND" }, 
      { city: "Париж", code: "CDG" }, { city: "Стамбул", code: "IST" }, 
      { city: "Бангкок", code: "BKK" }, { city: "Пхукет", code: "HKT" },
      { city: "Сеул", code: "ICN" }, { city: "Сингапур", code: "SIN" }, 
      { city: "Лос-Анджелес", code: "LAX" }, { city: "Рим", code: "FCO" }, 
      { city: "Барселона", code: "BCN" }, { city: "Берлин", code: "BER" }, 
      { city: "Сидней", code: "SYD" }, { city: "Пекин", code: "PEK" }, 
      { city: "Каир", code: "CAI" }, { city: "Рио-де-Жанейро", code: "GIG" }, 
      { city: "Дели", code: "DEL" }, { city: "Мальдивы", code: "MLE" }, 
      { city: "Амстердам", code: "AMS" }, { city: "Мадрид", code: "MAD" }, 
      { city: "Торонто", code: "YYZ" }, { city: "Майами", code: "MIA" }, 
      { city: "Доха", code: "DOH" }, { city: "Мюнхен", code: "MUC" }, 
      { city: "Вена", code: "VIE" }, { city: "Гонконг", code: "HKG" }, 
      { city: "Милан", code: "MXP" }, { city: "Анталья", code: "AYT" }
    ];

    // === БАЗА ОТЕЛЕЙ С ФОТОГРАФИЯМИ ИЗ ИНТЕРНЕТА ===
    const HOTELS_POOL = [
      { name: "Grand Royal Luxury Hotel", stars: "⭐⭐⭐⭐⭐", price: 14500, img: "https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=600&q=80" },
      { name: "Radisson Blu Premium Resort", stars: "⭐⭐⭐⭐⭐", price: 11200, img: "https://images.unsplash.com/photo-1520250497591-112f2f40a3f4?auto=format&fit=crop&w=600&q=80" },
      { name: "Plaza Central Suites", stars: "⭐⭐⭐⭐", price: 7800, img: "https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?auto=format&fit=crop&w=600&q=80" },
      { name: "Sea Breeze Comfort Inn", stars: "⭐⭐⭐⭐", price: 6200, img: "https://images.unsplash.com/photo-1582719508461-905c673771fd?auto=format&fit=crop&w=600&q=80" },
      { name: "Holiday Hub & SPA", stars: "⭐⭐⭐", price: 4500, img: "https://images.unsplash.com/photo-1455587734955-081b22074842?auto=format&fit=crop&w=600&q=80" }
    ];

    const AIRLINES = ["SkyGen Airlines", "Oceanic Air", "Global Jet", "AeroNomad"];

    // === ИКОНКИ ===
    const IconPlane = () => <svg className="w-6 h-6 inline" fill="currentColor" viewBox="0 0 24 24"><path d="M21 16V14L13 9V3.5A1.5 1.5 0 0 0 11.5 2A1.5 1.5 0 0 0 10 3.5V9L2 14V16L10 13.5V19L8 20.5V22L11.5 21L15 22V20.5L13 19V13.5L21 16Z"/></svg>;
    const IconArrow = () => <svg className="w-5 h-5 inline text-gray-400" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>;
    const IconTicket = () => <svg className="w-6 h-6 inline" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"/></svg>;
    const IconBriefcase = () => <svg className="w-5 h-5 inline" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>;
    const IconTrash = () => <svg className="w-5 h-5 inline text-red-400 hover:text-red-600" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>;
    const IconHotel = () => <svg className="w-5 h-5 inline" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" /></svg>;

    // === ГЕНЕРАТОР РЕЙСОВ ===
    const generateFlights = (fromCode, toCode, dateFrom, dateTo, count = 6) => {
      return Array.from({ length: count }).map(() => {
        const durationHours = Math.floor(Math.random() * 8) + 2;
        const durationMins = Math.floor(Math.random() * 60);
        const depHour = Math.floor(Math.random() * 16) + 4;
        const arrHour = (depHour + durationHours) % 24;
        
        return {
          id: Math.random().toString(36).substr(2, 8).toUpperCase(),
          airline: AIRLINES[Math.floor(Math.random() * AIRLINES.length)],
          flightNumber: `SG-${Math.floor(Math.random() * 9000) + 1000}`,
          departure: `${depHour.toString().padStart(2, '0')}:${durationMins.toString().padStart(2, '0')}`,
          arrival: `${arrHour.toString().padStart(2, '0')}:45`,
          duration: `${durationHours}ч ${durationMins}м`,
          price: Math.floor(Math.random() * 45000) + 12000,
          from: fromCode,
          to: toCode,
          dateFrom: dateFrom,
          dateTo: dateTo,
          gate: `G${Math.floor(Math.random() * 50) + 1}`
        };
      });
    };

    // === КОМПОНЕНТ QR-КОДА ===
    const QRCodeBlock = ({ text }) => {
      const qrRef = React.useRef(null);
      React.useEffect(() => {
        qrRef.current.innerHTML = ""; 
        new QRCode(qrRef.current, {
          text: text,
          width: 80,
          height: 80,
          colorDark: "#1e293b", 
          colorLight: "#ffffff",
          correctLevel: QRCode.CorrectLevel.L
        });
      }, [text]);
      return <div ref={qrRef} className="p-1.5 bg-white border rounded-lg shadow-sm"></div>;
    };

    // === ГЛАВНЫЙ КОМПОНЕНТ ПРИЛОЖЕНИЯ ===
    function App() {
      const [step, setStep] = React.useState('search'); // search, results, seats, hotels, ticket, trips
      const [isSearchOpen, setIsSearchOpen] = React.useState(false);
      const [sortBy, setSortBy] = React.useState('cheap'); 
      const [suggestions, setSuggestions] = React.useState([]);

      const [params, setParams] = React.useState({
        from: 'SVO', to: 'VVO',
        dateFrom: new Date().toISOString().split('T')[0],
        dateTo: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0],
        passengers: 1, flightClass: 'Эконом', baggage: true, pet: false
      });
      
      const [flights, setFlights] = React.useState([]);
      const [selectedFlight, setSelectedFlight] = React.useState(null);
      const [selectedHotel, setSelectedHotel] = React.useState(null); // Состояние для выбранного отеля
      
      // Карта кресел
      const [occupiedSeats, setOccupiedSeats] = React.useState([]);
      const [chosenSeats, setChosenSeats] = React.useState([]); 
      
      // Массив имён пассажиров (динамический)
      const [passengerNames, setPassengerNames] = React.useState(['NYASHIK']);

      // Хранилище поездок (localStorage)
      const [trips, setTrips] = React.useState(() => {
        const saved = localStorage.getItem('skygen_trips');
        return saved ? JSON.parse(saved) : [];
      });

      const ticketRef = React.useRef(null);

      // Генерация спецпредложений на старте
      React.useEffect(() => {
        const randomFlights = Array.from({ length: 8 }).map(() => {
          const fromCity = CITIES[Math.floor(Math.random() * CITIES.length)];
          let toCity = CITIES[Math.floor(Math.random() * CITIES.length)];
          while(fromCity.code === toCity.code) toCity = CITIES[Math.floor(Math.random() * CITIES.length)];
          const dFrom = new Date().toISOString().split('T')[0];
          const dTo = new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0];
          return generateFlights(fromCity.code, toCity.code, dFrom, dTo, 1)[0];
        });
        setSuggestions(randomFlights);
      }, []);

      // Синхронизация количества полей имён с числом пассажиров
      React.useEffect(() => {
        const count = Number(params.passengers);
        setPassengerNames(prev => {
          const next = [...prev];
          if (next.length < count) {
            for (let i = next.length; i < count; i++) next.push(`PASSENGER ${i + 1}`);
          } else if (next.length > count) {
            return next.slice(0, count);
          }
          return next;
        });
      }, [params.passengers]);

      const handleDateFromChange = (e) => {
        const newDateFrom = e.target.value;
        let newDateTo = params.dateTo;
        if (new Date(newDateFrom) > new Date(newDateTo)) newDateTo = newDateFrom;
        setParams({ ...params, dateFrom: newDateFrom, dateTo: newDateTo });
      };

      const handlePassengersChange = (e) => {
        let val = Math.floor(Number(e.target.value));
        if (val > 5) val = 5; 
        if (val < 1) val = 1; 
        setParams({ ...params, passengers: val });
      };

      const handleSearch = (e) => {
        e.preventDefault();
        if (params.from === params.to) {
          alert("Выберите разные города!");
          return;
        }
        if (new Date(params.dateTo) < new Date(params.dateFrom)) {
          alert("Дата обратно не может быть раньше даты вылета!");
          return;
        }
        setFlights(generateFlights(params.from, params.to, params.dateFrom, params.dateTo, 6));
        setStep('results');
      };

      const goToSeatSelection = (flight) => {
        setSelectedFlight(flight);
        setSelectedHotel(null); // Сброс отеля при новом бронировании
        setChosenSeats([]); 
        
        const occupied = [];
        const rows = 12;
        const cols = ['A','B','C','D','E','F'];
        for (let r = 1; r <= rows; r++) {
          cols.forEach(c => {
            if (Math.random() < 0.4) occupied.push(`${r}${c}`);
          });
        }
        setOccupiedSeats(occupied);
        setStep('seats');
      };

      const handleSeatClick = (seatId, isBusinessRow) => {
        if (isBusinessRow && params.flightClass !== 'Бизнес') {
          alert("Эти места доступны только для Бизнес-класса!");
          return;
        }

        if (chosenSeats.includes(seatId)) {
          setChosenSeats(chosenSeats.filter(s => s !== seatId));
        } else {
          if (chosenSeats.length >= Number(params.passengers)) {
            alert(`Вы выбрали максимальное количество мест для ${params.passengers} пасс.`);
            return;
          }
          setChosenSeats([...chosenSeats, seatId]);
        }
      };

      const handleNameChange = (index, value) => {
        const updatedNames = [...passengerNames];
        updatedNames[index] = value.toUpperCase();
        setPassengerNames(updatedNames);
      };

      const handleDownloadTicket = async () => {
        if (!ticketRef.current) return;
        const canvas = await html2canvas(ticketRef.current, { scale: 2 });
        const link = document.createElement('a');
        link.download = `SkyGen_Trip_${selectedFlight.flightNumber}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      const saveToMyTrips = () => {
        const tripId = selectedFlight.id + chosenSeats.join('-');
        if (trips.some(t => t.tripId === tripId)) {
          alert("Этот билет уже сохранён в Мои поездки!");
          return;
        }
        const newTrip = {
          tripId,
          flight: selectedFlight,
          hotel: selectedHotel, // Сохраняем информацию об отеле (может быть null)
          seats: chosenSeats,
          passengers: passengerNames,
          class: params.flightClass,
          options: { baggage: params.baggage, pet: params.pet }
        };
        const updatedTrips = [newTrip, ...trips];
        setTrips(updatedTrips);
        localStorage.setItem('skygen_trips', JSON.stringify(updatedTrips));
        alert("Успешно добавлено в 'Мои поездки'!");
      };

      const deleteTrip = (e, tripId) => {
        e.stopPropagation();
        const updated = trips.filter(t => t.tripId !== tripId);
        setTrips(updated);
        localStorage.setItem('skygen_trips', JSON.stringify(updated));
      };

      const sortedFlights = [...flights].sort((a, b) => sortBy === 'cheap' ? a.price - b.price : b.price - a.price);
      const isAllSeatsSelected = chosenSeats.length === Number(params.passengers);

      // Получаем название города по его коду IATA
      const getCityName = (code) => {
        const found = CITIES.find(c => c.code === code);
        return found ? found.city : code;
      };

      // === КОМПОНЕНТ ИНДИКАТОРА ШАГОВ (ИНДИКАТОР ПРОГРЕССА) ===
      const StepIndicator = () => {
        if (step === 'search' || step === 'trips') return null;
        
        const stepsList = [
          { key: 'results', label: 'Выбор рейса' },
          { key: 'seats', label: 'Места' },
          { key: 'hotels', label: 'Отель' },
          { key: 'ticket', label: 'Билет' }
        ];

        return (
          <div className="bg-white p-4 rounded-xl border mb-6 shadow-sm flex items-center justify-between">
            {stepsList.map((s, index) => {
              const isCurrent = step === s.key;
              const isPassed = stepsList.findIndex(x => x.key === step) > index;
              
              return (
                <div key={s.key} className="flex items-center flex-1 last:flex-none">
                  <div className="flex items-center gap-2">
                    <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold transition-all ${
                      isCurrent ? 'bg-[#0057b8] text-white ring-4 ring-blue-100' : 
                      isPassed ? 'bg-green-500 text-white' : 'bg-gray-100 text-gray-400'
                    }`}>
                      {isPassed ? '✓' : index + 1}
                    </div>
                    <span className={`text-xs font-bold hidden sm:inline ${isCurrent ? 'text-slate-800' : 'text-gray-400'}`}>
                      {s.label}
                    </span>
                  </div>
                  {index < stepsList.length - 1 && (
                    <div className={`h-0.5 flex-1 mx-4 rounded ${isPassed ? 'bg-green-300' : 'bg-gray-100'}`}></div>
                  )}
                </div>
              );
            })}
          </div>
        );
      };

      return (
        <div className="min-h-screen flex flex-col pb-10">
          {/* ШАПКА */}
          <header className="bg-[#0057b8] text-white py-4 px-6 shadow-md flex items-center justify-between z-10 sticky top-0">
            <div className="flex items-center gap-2 text-xl font-bold tracking-wider cursor-pointer" onClick={() => {setStep('search'); setIsSearchOpen(false);}}>
              <IconPlane />
              <span>SKYGEN</span>
            </div>
            <button 
              onClick={() => setStep('trips')} 
              className="flex items-center gap-1.5 bg-blue-800 hover:bg-blue-900 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors"
            >
              <IconBriefcase />
              <span>Мои поездки</span>
            </button>
          </header>

          <main className="max-w-4xl mx-auto w-full py-6 px-4 flex-1">
            
            {/* Твой новый индикатор шагов */}
            <StepIndicator />

            {/* ЭКРАН 1: ПОИСК И ПРЕДЛОЖЕНИЯ */}
            {step === 'search' && (
              <div className="space-y-8">
                <div className="bg-white rounded-2xl shadow-lg border border-gray-100 overflow-hidden transition-all duration-300">
                  <div 
                    className="p-5 flex justify-between items-center bg-[#0057b8] text-white cursor-pointer active:bg-blue-800 transition-colors"
                    onClick={() => setIsSearchOpen(!isSearchOpen)}
                  >
                    <h1 className="text-xl font-bold flex items-center gap-3"><IconTicket /> Купить билеты / Отели</h1>
                    <span className="text-2xl leading-none font-light">{isSearchOpen ? '−' : '+'}</span>
                  </div>
                  
                  {(!isSearchOpen) && (
                    <div className="p-6 text-center text-gray-400 font-semibold text-sm">
                      Нажмите сюда, чтобы открыть форму поиска путешествия 👇
                    </div>
                  )}

                  {isSearchOpen && (
                    <div className="p-6">
                      <form onSubmit={handleSearch} noValidate className="space-y-4">
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                          <div>
                            <label className="text-xs font-bold text-gray-400 block mb-1">Откуда</label>
                            <select value={params.from} onChange={e => setParams({...params, from: e.target.value})} className="w-full p-3 border rounded-xl bg-white outline-none focus:border-[#0057b8]">
                              {CITIES.map(c => <option key={c.code} value={c.code}>{c.city} ({c.code})</option>)}
                            </select>
                          </div>
                          <div>
                            <label className="text-xs font-bold text-gray-400 block mb-1">Куда</label>
                            <select value={params.to} onChange={e => setParams({...params, to: e.target.value})} className="w-full p-3 border rounded-xl bg-white outline-none focus:border-[#0057b8]">
                              {CITIES.map(c => <option key={c.code} value={c.code}>{c.city} ({c.code})</option>)}
                            </select>
                          </div>
                          <div>
                            <label className="text-xs font-bold text-gray-400 block mb-1">Туда</label>
                            <input type="date" value={params.dateFrom} onChange={handleDateFromChange} className="w-full p-3 border rounded-xl outline-none focus:border-[#0057b8]" />
                          </div>
                          <div>
                            <label className="text-xs font-bold text-gray-400 block mb-1">Обратно</label>
                            <input type="date" value={params.dateTo} onChange={e => setParams({...params, dateTo: e.target.value})} className="w-full p-3 border rounded-xl outline-none focus:border-[#0057b8]" />
                          </div>
                          <div>
                            <label className="text-xs font-bold text-gray-400 block mb-1">Класс обслуживания</label>
                            <select value={params.flightClass} onChange={e => setParams({...params, flightClass: e.target.value})} className="w-full p-3 border rounded-xl bg-white outline-none focus:border-[#0057b8]">
                              <option>Эконом</option>
                              <option>Бизнес</option>
                            </select>
                          </div>
                          <div>
                            <label className="text-xs font-bold text-gray-400 block mb-1">Пассажиры (Лимит: 1–5 чел.)</label>
                            <input type="number" min="1" max="5" value={params.passengers} onChange={handlePassengersChange} className="w-full p-3 border rounded-xl outline-none focus:border-[#0057b8] font-bold" />
                          </div>
                        </div>
                        <div className="flex gap-4 pt-2 text-sm">
                          <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={params.baggage} onChange={e => setParams({...params, baggage: e.target.checked})} className="w-4 h-4 accent-[#0057b8]" /><span>Багаж включен</span></label>
                          <label className="flex items-center gap-2 cursor-pointer"><input type="checkbox" checked={params.pet} onChange={e => setParams({...params, pet: e.target.checked})} className="w-4 h-4 accent-[#0057b8]" /><span>С питомцем</span></label>
                        </div>
                        <button type="submit" className="w-full bg-[#0057b8] text-white font-bold py-3.5 rounded-xl shadow-md active:scale-[0.98] transition-all">Найти рейсы</button>
                      </form>
                    </div>
                  )}
                </div>

                {/* Горячие предложения */}
                <div>
                  <h2 className="text-xl font-bold mb-4 text-slate-800">🔥 Популярные рейсы со скидкой</h2>
                  <div className="flex overflow-x-auto gap-4 pb-4 snap-x hide-scrollbar">
                    {suggestions.map(flight => (
                      <div key={flight.id} className="min-w-[280px] bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col gap-4 snap-start shrink-0 relative overflow-hidden">
                        <div className="absolute top-0 right-0 bg-red-500 text-white text-[10px] font-bold px-2 py-1 rounded-bl-lg">SALE</div>
                        <div className="text-xs font-bold text-gray-400">{flight.airline}</div>
                        <div className="flex justify-between items-center">
                          <div><div className="text-2xl font-black">{flight.from}</div><div className="text-xs text-gray-500">{flight.departure}</div></div>
                          <IconArrow />
                          <div className="text-right"><div className="text-2xl font-black">{flight.to}</div><div className="text-xs text-gray-500">{flight.arrival}</div></div>
                        </div>
                        <div className="flex justify-between items-center pt-3 border-t border-gray-100">
                          <span className="text-lg font-extrabold text-[#0057b8]">{flight.price.toLocaleString('ru-RU')} ₽</span>
                          <button onClick={() => goToSeatSelection(flight)} className="bg-[#0057b8] text-white px-4 py-2 rounded-lg font-bold text-xs">Выбрать</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              </div>
            )}

            {/* ЭКРАН 2: РЕЗУЛЬТАТЫ ПОИСКА */}
            {step === 'results' && (
              <div className="space-y-4">
                <div className="flex justify-between mb-2">
                  <button onClick={() => {setStep('search'); setIsSearchOpen(true);}} className="text-[#0057b8] text-sm font-semibold">← Изменить поиск</button>
                  <select value={sortBy} onChange={e => setSortBy(e.target.value)} className="p-1 border rounded bg-white text-xs text-[#0057b8] font-semibold outline-none">
                    <option value="cheap">Сначала дешёвые</option>
                    <option value="expensive">Сначала дорогие</option>
                  </select>
                </div>
                <h2 className="text-xl font-bold">Рейсы: {getCityName(params.from)} → {getCityName(params.to)}</h2>
                {sortedFlights.map(flight => (
                  <div key={flight.id} className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col gap-4">
                    <div className="flex justify-between text-xs font-bold text-gray-400"><span>{flight.airline}</span><span>{flight.flightNumber}</span></div>
                    <div className="flex justify-between items-center">
                      <div><div className="text-2xl font-bold">{flight.departure}</div><div className="text-xs text-gray-500">{flight.from}</div></div>
                      <div className="text-center flex-1 px-4 text-xs text-gray-400">
                        <div>{flight.duration}</div>
                        <div className="h-px bg-gray-200 my-1 relative"></div>
                        <div className="text-[10px]">{flight.dateFrom}</div>
                      </div>
                      <div className="text-right"><div className="text-2xl font-bold">{flight.arrival}</div><div className="text-xs text-gray-500">{flight.to}</div></div>
                    </div>
                    <div className="flex justify-between items-center pt-3 border-t">
                      <span className="text-xl font-extrabold text-[#0057b8]">{flight.price.toLocaleString('ru-RU')} ₽</span>
                      <button onClick={() => goToSeatSelection(flight)} className="bg-[#0057b8] text-white px-5 py-2 rounded-lg font-bold text-sm">Выбрать</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* ЭКРАН 3: ВЫБОР МЕСТА */}
            {step === 'seats' && selectedFlight && (
              <div className="flex flex-col items-center">
                <button onClick={() => setStep('results')} className="text-[#0057b8] text-sm font-semibold mb-4 self-start">← Назад к рейсам</button>
                <div className="w-full max-w-md bg-white p-6 rounded-3xl shadow-lg border border-gray-200">
                  <div className="text-center mb-4">
                    <h2 className="text-2xl font-black text-slate-800">Выберите место</h2>
                    <p className="text-xs text-gray-400">Пассажиров: <span className="font-bold text-slate-700">{params.passengers}</span> • Класс: <span className="font-bold text-blue-600">{params.flightClass}</span></p>
                  </div>

                  <div className="bg-gray-50 rounded-full py-1.5 mb-6 mx-auto w-3/4 text-center text-[10px] font-bold text-gray-400 tracking-widest border border-gray-200">
                    НОС САМОЛЁТА
                  </div>

                  <div className="flex flex-col gap-3 items-center">
                    {Array.from({ length: 12 }).map((_, rIndex) => {
                      const row = rIndex + 1;
                      const isBusinessRow = row <= 2; 
                      
                      return (
                        <div key={row} className="flex items-center gap-3">
                          <div className="flex gap-2">
                            {['A','B','C'].map(c => {
                              const seatId = `${row}${c}`;
                              const isOccup = occupiedSeats.includes(seatId);
                              const isSelected = chosenSeats.includes(seatId);
                              
                              let btnClass = "w-10 h-10 rounded-t-xl rounded-b-md text-xs font-bold flex items-center justify-center cursor-pointer transition-all border-b-4 ";
                              if (isOccup) btnClass += "bg-gray-200 text-gray-400 border-gray-300 cursor-not-allowed opacity-60";
                              else if (isSelected) btnClass += "bg-[#0057b8] text-white border-blue-900 scale-110 shadow-md";
                              else if (isBusinessRow) btnClass += "bg-yellow-100 text-yellow-700 border-yellow-400 hover:bg-yellow-200";
                              else btnClass += "bg-blue-50 text-blue-600 border-blue-200 hover:bg-blue-100";
                              
                              return <div key={seatId} onClick={() => !isOccup && handleSeatClick(seatId, isBusinessRow)} className={btnClass}>{c}</div>
                            })}
                          </div>
                          <div className="w-6 text-center text-xs font-bold text-gray-300">{row}</div>
                          <div className="flex gap-2">
                            {['D','E','F'].map(c => {
                              const seatId = `${row}${c}`;
                              const isOccup = occupiedSeats.includes(seatId);
                              const isSelected = chosenSeats.includes(seatId);
                              
                              let btnClass = "w-10 h-10 rounded-t-xl rounded-b-md text-xs font-bold flex items-center justify-center cursor-pointer transition-all border-b-4 ";
                              if (isOccup) btnClass += "bg-gray-200 text-gray-400 border-gray-300 cursor-not-allowed opacity-60";
                              else if (isSelected) btnClass += "bg-[#0057b8] text-white border-blue-900 scale-110 shadow-md";
                              else if (isBusinessRow) btnClass += "bg-yellow-100 text-yellow-700 border-yellow-400 hover:bg-yellow-200";
                              else btnClass += "bg-blue-50 text-blue-600 border-blue-200 hover:bg-blue-100";
                              
                              return <div key={seatId} onClick={() => !isOccup && handleSeatClick(seatId, isBusinessRow)} className={btnClass}>{c}</div>
                            })}
                          </div>
                        </div>
                      )
                    })}
                  </div>

                  <div className="flex justify-center gap-4 mt-8 text-xs font-bold text-gray-500 flex-wrap">
                    <div className="flex items-center gap-1.5"><div className="w-4 h-4 bg-gray-200 rounded border-b-2 border-gray-300"></div>Занято</div>
                    <div className="flex items-center gap-1.5"><div className="w-4 h-4 bg-blue-50 rounded border-b-2 border-blue-200"></div>Эконом</div>
                    <div className="flex items-center gap-1.5"><div className="w-4 h-4 bg-yellow-100 rounded border-b-2 border-yellow-400"></div>Бизнес</div>
                    <div className="flex items-center gap-1.5"><div className="w-4 h-4 bg-[#0057b8] rounded border-b-2 border-blue-900"></div>Ваше</div>
                  </div>

                  <button 
                    onClick={() => isAllSeatsSelected ? setStep('hotels') : alert(`Выберите ровно столько мест, сколько пассажиров (${params.passengers} шт.)`)} 
                    className={`w-full mt-6 py-4 rounded-xl font-bold shadow-md transition-all ${isAllSeatsSelected ? 'bg-[#0057b8] text-white active:scale-95' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}
                  >
                    {isAllSeatsSelected ? `Подтвердить места и перейти к отелям` : `Выбрано мест: ${chosenSeats.length} из ${params.passengers}`}
                  </button>
                </div>
              </div>
            )}

            {/* НОВЫЙ ЭКРАН 4: ВЫБОР ОТЕЛЯ (ОПЦИОНАЛЬНО) */}
            {step === 'hotels' && selectedFlight && (
              <div className="space-y-6">
                <div className="flex justify-between items-center">
                  <button onClick={() => setStep('seats')} className="text-[#0057b8] text-sm font-semibold">← Назад к выбору мест</button>
                  <button 
                    onClick={() => { setSelectedHotel(null); setStep('ticket'); }} 
                    className="text-gray-500 hover:text-slate-800 text-sm font-bold bg-gray-200 px-4 py-2 rounded-xl transition-colors"
                  >
                    Пропустить отель ➔
                  </button>
                </div>

                <div className="bg-blue-50 p-5 rounded-2xl border border-blue-100">
                  <h2 className="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <IconHotel /> Жилье в городе {getCityName(params.to)}
                  </h2>
                  <p className="text-xs text-gray-500 mt-1">
                    Мы подобрали лучшие варианты на ваши даты. Номера автоматически бронируются с расчетом под количество гостей: <span className="font-bold text-[#0057b8]">{params.passengers} чел.</span>
                  </p>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {HOTELS_POOL.map((hotel, idx) => (
                    <div key={idx} className="bg-white rounded-2xl border border-gray-200 overflow-hidden shadow-sm flex flex-col group hover:shadow-md transition-shadow">
                      <div className="h-48 w-full overflow-hidden relative">
                        <img src={hotel.img} alt={hotel.name} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                        <div className="absolute top-3 left-3 bg-white/90 backdrop-blur-sm text-slate-800 px-2.5 py-1 rounded-lg text-xs font-black shadow-sm">
                          {hotel.stars}
                        </div>
                      </div>
                      <div className="p-5 flex flex-col flex-1 justify-between gap-4">
                        <div>
                          <h3 className="font-black text-lg text-slate-800 leading-tight">{hotel.name}</h3>
                          <p className="text-xs text-gray-400 mt-1">г. {getCityName(params.to)}, центральный район</p>
                        </div>
                        <div className="flex justify-between items-center pt-3 border-t">
                          <div>
                            <span className="text-xl font-black text-slate-800">{(hotel.price * params.passengers).toLocaleString('ru-RU')} ₽</span>
                            <span className="text-[10px] text-gray-400 block font-bold">за ночь ({params.passengers} пасс.)</span>
                          </div>
                          <button 
                            onClick={() => { setSelectedHotel({ ...hotel, totalTripPrice: hotel.price * params.passengers }); setStep('ticket'); }} 
                            className="bg-[#0057b8] text-white font-bold text-xs px-4 py-2.5 rounded-xl active:scale-95 transition-all shadow-sm"
                          >
                            Забронировать
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* ЭКРАН 5: ГОТОВЫЙ БИЛЕТ С МУЛЬТИ-ИМЕНАМИ И ОTEXTОМ */}
            {step === 'ticket' && selectedFlight && (
              <div className="flex flex-col items-center">
                <button onClick={() => setStep('hotels')} className="text-[#0057b8] text-sm font-semibold mb-4 self-start">← Изменить выбор жилья</button>

                {/* БЛОК ДИНАМИЧЕСКИХ ИМЁН ПАССАЖИРОВ */}
                <div className="w-full bg-white p-5 rounded-xl border mb-6 shadow-sm space-y-3">
                  <h3 className="text-sm font-bold text-slate-700 border-b pb-1.5">Имена пассажиров латиницей:</h3>
                  {passengerNames.map((name, idx) => (
                    <div key={idx}>
                      <label className="text-[10px] font-bold text-gray-400 block mb-0.5">Пассажир {idx + 1} (Место {chosenSeats[idx] || '?'})</label>
                      <input 
                        type="text" 
                        value={name} 
                        onChange={(e) => handleNameChange(idx, e.target.value)} 
                        className="w-full p-2.5 border rounded-xl font-mono uppercase outline-none focus:border-[#0057b8]" 
                        placeholder="IVAN IVANOV" 
                      />
                    </div>
                  ))}
                </div>

                {/* ЕДИНЫЙ КОМПЛЕКСНЫЙ БИЛЕТ ДЛЯ СКАЧИВАНИЯ */}
                <div ref={ticketRef} className="bg-gray-100 p-3 rounded-3xl w-full max-w-md border border-gray-300 space-y-4">
                  
                  {/* ЧАСТЬ 1: ПОСАДОЧНЫЙ ТАЛОН */}
                  <div className="bg-white rounded-2xl shadow-md overflow-hidden relative border border-gray-200">
                    <div className="bg-[#0057b8] text-white p-4 flex justify-between items-center">
                      <span className="font-bold tracking-wider">{selectedFlight.airline}</span>
                      <span className="text-xs border px-2 py-0.5 rounded font-mono bg-white/20">BOARDING PASS</span>
                    </div>
                    
                    <div className="p-5 space-y-4">
                      <div className="flex justify-between border-b pb-3">
                        <div className="flex-1 mr-2">
                          <div className="text-[10px] uppercase text-gray-400 font-bold">Passengers</div>
                          <div className="font-mono font-bold text-xs max-h-24 overflow-y-auto leading-relaxed whitespace-pre-line">
                            {passengerNames.map((n, i) => `${i+1}. ${n || 'GUEST'} [${chosenSeats[i] || ''}]`).join('\n')}
                          </div>
                        </div>
                        <div className="text-right shrink-0">
                          <div className="text-[10px] uppercase text-gray-400 font-bold">Flight</div>
                          <div className="font-mono font-bold text-lg">{selectedFlight.flightNumber}</div>
                        </div>
                      </div>

                      <div className="flex justify-between items-center py-2">
                        <div>
                          <div className="text-4xl font-black">{selectedFlight.from}</div>
                          <div className="text-[10px] text-gray-400 font-bold">Вылет {selectedFlight.departure}</div>
                        </div>
                        <div className="text-gray-300 text-xl">➔</div>
                        <div className="text-right">
                          <div className="text-4xl font-black">{selectedFlight.to}</div>
                          <div className="text-[10px] text-gray-400 font-bold">Прилет {selectedFlight.arrival}</div>
                        </div>
                      </div>

                      <div className="grid grid-cols-3 gap-2 bg-gray-50 p-3 rounded-xl text-center text-sm border">
                        <div>
                          <div className="text-[9px] text-gray-400 font-bold uppercase">Дата вылета</div>
                          <div className="font-bold text-[11px] leading-tight mt-1">{selectedFlight.dateFrom}</div>
                        </div>
                        <div>
                          <div className="text-[9px] text-gray-400 font-bold uppercase">Выход</div>
                          <div className="font-bold text-lg">{selectedFlight.gate}</div>
                        </div>
                        <div>
                          <div className="text-[9px] text-gray-400 font-bold uppercase">Все Места</div>
                          <div className="font-bold font-mono text-xs text-[#0057b8] break-words max-w-full leading-tight pt-1">{chosenSeats.join(', ')}</div>
                        </div>
                      </div>

                      <div className="flex justify-between items-center pt-2 text-[10px] font-bold text-gray-400">
                        <div>КЛАСС: {params.flightClass.toUpperCase()}</div>
                        <div>{params.baggage ? '✓ БАГАЖ' : ''} {params.pet ? '• ПИТОМЕЦ' : ''}</div>
                      </div>
                    </div>
                  </div>

                  {/* ЧАСТЬ 2: ВАУЧЕР НА ОТЕЛЬ (ЕСЛИ ВЫБРАН) */}
                  {selectedHotel && (
                    <div className="bg-white rounded-2xl shadow-md overflow-hidden border border-green-200 relative animate-fade-in">
                      <div className="bg-green-600 text-white p-3 flex justify-between items-center">
                        <span className="font-bold text-xs tracking-wider flex items-center gap-1">
                          <IconHotel /> ВАУЧЕР НА ПРОЖИВАНИЕ
                        </span>
                        <span className="text-[9px] border px-2 py-0.5 rounded font-mono bg-white/20">HOTEL BOOKING</span>
                      </div>
                      <div className="p-4 flex gap-4">
                        <img src={selectedHotel.img} alt="" className="w-16 h-16 rounded-xl object-cover border" />
                        <div className="flex-1 min-w-0">
                          <h4 className="font-black text-sm text-slate-800 truncate">{selectedHotel.name}</h4>
                          <p className="text-[10px] text-gray-400 font-bold mt-0.5">{selectedHotel.stars} • {getCityName(params.to)}</p>
                          <div className="mt-2 text-[11px] bg-green-50 text-green-700 px-2 py-1 rounded font-mono inline-block font-bold">
                            Гостей: {params.passengers} | Номер забронирован
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* ОБЩИЙ QR КОД ДЛЯ АВИА + ОТЕЛЯ */}
                  <div className="bg-white p-4 rounded-2xl border border-gray-200 flex justify-between items-center">
                    <div className="flex flex-col">
                       <span className="text-[9px] text-gray-400 font-bold uppercase mb-1">СКАНИРОВАТЬ ДЛЯ ПРОВЕРКИ</span>
                       <span className="text-[11px] font-mono font-bold">ID Поездки: {selectedFlight.id}</span>
                       {selectedHotel && <span className="text-[10px] text-green-600 font-bold mt-1">✓ Комбо: Рейс + Отель</span>}
                    </div>
                    <QRCodeBlock text={`ID:${selectedFlight.id}|PASSENGERS:${passengerNames.join(',')}|FLIGHT:${selectedFlight.flightNumber}|SEATS:${chosenSeats.join(',')}|HOTEL:${selectedHotel ? selectedHotel.name : 'NONE'}`} />
                  </div>
                </div>

                {/* КНОПКИ ДЕЙСТВИЯ */}
                <div className="grid grid-cols-2 gap-4 w-full max-w-md mt-6">
                  <button onClick={handleDownloadTicket} className="bg-slate-800 text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-all text-sm">
                    💾 Сохранить в галерею
                  </button>
                  <button onClick={saveToMyTrips} className="bg-[#0057b8] text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-all text-sm">
                    ⭐ В Мои поездки
                  </button>
                </div>
              </div>
            )}

            {/* ЭКРАН 6: МОИ ПОЕЗДКИ / ИСТОРИЯ ПОКУПОК */}
            {step === 'trips' && (
              <div className="space-y-4">
                <button onClick={() => setStep('search')} className="text-[#0057b8] text-sm font-semibold mb-2">← На главную</button>
                <h2 className="text-2xl font-bold flex items-center gap-2"><IconBriefcase /> Ваши сохраненные маршруты</h2>
                
                {trips.length === 0 ? (
                  <div className="text-center py-12 bg-white rounded-xl border border-dashed border-gray-300">
                    <p className="text-gray-400 font-semibold mb-2">Вы еще не сохранили ни одного билета.</p>
                    <button onClick={() => setStep('search')} className="text-xs bg-[#0057b8] text-white px-4 py-2 rounded-lg font-bold mt-2">Найти первое путешествие</button>
                  </div>
                ) : (
                  <div className="grid gap-4">
                    {trips.map(trip => (
                      <div 
                        key={trip.tripId} 
                        onClick={() => {
                          setSelectedFlight(trip.flight);
                          setSelectedHotel(trip.hotel);
                          setChosenSeats(trip.seats);
                          setPassengerNames(trip.passengers);
                          setParams({...params, passengers: trip.passengers.length, flightClass: trip.class, baggage: trip.options.baggage, pet: trip.options.pet});
                          setStep('ticket');
                        }}
                        className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 flex justify-between items-center cursor-pointer hover:shadow-md transition-all group relative overflow-hidden"
                      >
                        {trip.hotel && <div className="absolute top-0 left-0 bg-green-500 w-1.5 h-full"></div>}
                        
                        <div className="flex flex-col max-w-[85%] space-y-1">
                          <span className="text-xs text-gray-400 font-bold">{trip.flight.dateFrom} • Рейс {trip.flight.flightNumber}</span>
                          <span className="text-lg font-black text-slate-800">{getCityName(trip.flight.from)} ➔ {getCityName(trip.flight.to)}</span>
                          
                          <div className="flex flex-wrap gap-2 pt-1">
                            <span className="text-[11px] bg-blue-50 text-[#0057b8] px-2 py-0.5 rounded-md font-mono">
                              Места: {trip.seats.join(', ')}
                            </span>
                            {trip.hotel && (
                              <span className="text-[11px] bg-green-50 text-green-700 px-2 py-0.5 rounded-md font-bold flex items-center gap-0.5">
                                🏨 Отель: {trip.hotel.name}
                              </span>
                            )}
                          </div>
                          
                          <p className="text-[10px] text-gray-400 truncate pt-1 font-medium">
                            Пассажиры: {trip.passengers.join(', ')}
                          </p>
                        </div>

                        <button onClick={(e) => deleteTrip(e, trip.tripId)} className="p-2 opacity-40 group-hover:opacity-100 text-red-400 hover:text-red-600 transition-all">
                          <IconTrash />
                        </button>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
