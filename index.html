<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SkyGen — Конструктор Путешествий</title>
  <!-- Подключаем иконки FontAwesome и шрифты -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --border-color: #334155;
      --card-bg: #1e293b;
      --success: #10b981;
      --glow: rgba(56, 189, 248, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid var(--border-color);
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      font-size: 28px;
      color: var(--accent);
      text-shadow: 0 0 10px var(--glow);
    }

    .logo-text h1 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .logo-text span {
      color: var(--accent);
    }

    .container {
      max-width: 1400px;
      width: 100%;
      margin: 30px auto;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 30px;
      flex-grow: 1;
    }

    /* Левая панель управления */
    .control-panel {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
      height: fit-content;
      position: sticky;
      top: 30px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    .panel-section {
      margin-bottom: 24px;
    }

    .panel-section:last-child {
      margin-bottom: 0;
    }

    .panel-section h3 {
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text-muted);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-box {
      position: relative;
      margin-bottom: 12px;
    }

    .search-box i {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
    }

    .search-box input {
      width: 100%;
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 12px 12px 12px 40px;
      color: var(--text-main);
      font-size: 14px;
      transition: all 0.3s ease;
    }

    .search-box input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--glow);
    }

    .city-list-wrapper {
      max-height: 280px;
      overflow-y: auto;
      border: 1px solid var(--border-color);
      border-radius: 10px;
      background-color: var(--bg-primary);
    }

    .city-item {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: all 0.2s ease;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }

    .city-item:last-child {
      border-bottom: none;
    }

    .city-item:hover {
      background-color: var(--border-color);
    }

    .city-item.active {
      background: linear-gradient(90deg, rgba(56,189,248,0.2) 0%, rgba(56,189,248,0.05) 100%);
      border-left: 4px solid var(--accent);
    }

    .city-info-main {
      font-weight: 500;
      font-size: 14px;
    }

    .city-country {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .city-code-badge {
      background-color: var(--border-color);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--accent);
    }

    /* Стилизация скроллбара */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-primary);
    }
    ::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    .filter-btn-group {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .filter-btn {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      color: var(--text-main);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .filter-btn:hover {
      border-color: var(--text-muted);
    }

    .filter-btn.active {
      border-color: var(--accent);
      background-color: rgba(56, 189, 248, 0.1);
      color: var(--accent);
    }

    .action-btn {
      width: 100%;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-hover) 100%);
      color: #000;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
    }

    .action-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5);
    }

    /* Правая рабочая область */
    .workspace {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .no-selection {
      background-color: var(--bg-secondary);
      border: 2px dashed var(--border-color);
      border-radius: 16px;
      padding: 80px 40px;
      text-align: center;
      color: var(--text-muted);
    }

    .no-selection i {
      font-size: 48px;
      margin-bottom: 16px;
      color: var(--border-color);
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .section-title i {
      color: var(--accent);
    }

    /* Карточки отелей */
    .hotels-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
      gap: 20px;
    }

    .hotel-card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s ease;
      position: relative;
    }

    .hotel-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 25px rgba(0,0,0,0.3);
    }

    .hotel-card.selected {
      border-color: var(--success);
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.2);
    }

    .hotel-card.selected::before {
      content: '\f058';
      font-family: 'Font Awesome 5 Free';
      font-weight: 900;
      position: absolute;
      top: 12px;
      right: 12px;
      color: var(--success);
      font-size: 24px;
      z-index: 10;
      background-color: rgba(0,0,0,0.6);
      border-radius: 50%;
    }

    .hotel-img-wrapper {
      height: 180px;
      position: relative;
    }

    .hotel-img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hotel-price-badge {
      position: absolute;
      bottom: 12px;
      left: 12px;
      background-color: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(4px);
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      color: var(--accent);
    }

    .hotel-content {
      padding: 16px;
    }

    .hotel-stars {
      color: #fbbf24;
      font-size: 12px;
      margin-bottom: 6px;
    }

    .hotel-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hotel-district {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Конструктор бортового питания */
    .food-constructor-box {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
    }

    .food-tabs {
      display: flex;
      gap: 10px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 12px;
      margin-bottom: 20px;
    }

    .food-tab-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.2s ease;
    }

    .food-tab-btn:hover {
      color: var(--text-main);
      background-color: rgba(255,255,255,0.05);
    }

    .food-tab-btn.active {
      color: var(--accent);
      background-color: rgba(56, 189, 248, 0.1);
    }

    .food-items-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 16px;
    }

    .food-card {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .food-card:hover {
      border-color: var(--accent);
    }

    .food-card.selected {
      border-color: var(--success);
      background-color: rgba(16, 185, 129, 0.03);
    }

    .food-card-img {
      height: 130px;
      width: 100%;
      object-fit: cover;
    }

    .food-card-body {
      padding: 12px;
    }

    .food-card-type {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .food-card-name {
      font-size: 13px;
      font-weight: 500;
    }

    /* Секция достопримечательностей */
    .sights-box {
      background-color: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 24px;
    }

    .sights-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }

    .sight-item-card {
      background-color: var(--bg-primary);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 16px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }

    .sight-icon-wrapper {
      background-color: rgba(56, 189, 248, 0.1);
      color: var(--accent);
      padding: 10px;
      border-radius: 8px;
      font-size: 16px;
    }

    .sight-text-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-main);
      margin-bottom: 2px;
    }

    .sight-text-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Итоговые документы (Ваучеры и Талоны) */
    .documents-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 10px;
    }

    /* Посадочный талон авиа */
    .boarding-pass {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
      position: relative;
    }

    .pass-header {
      background: linear-gradient(90deg, #0284c7 0%, #0369a1 100%);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .pass-airline {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    .pass-class {
      font-size: 11px;
      background-color: rgba(255,255,255,0.2);
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .pass-body {
      padding: 20px;
      position: relative;
    }

    .pass-flight-path {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .path-point h2 {
      font-size: 32px;
      font-weight: 700;
    }

    .path-point p {
      font-size: 12px;
      color: var(--text-muted);
    }

    .path-connector {
      flex-grow: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
      margin: 0 15px;
    }

    .path-line {
      width: 100%;
      height: 2px;
      background-color: var(--border-color);
      position: relative;
    }

    .path-line::after {
      content: '\f072';
      font-family: 'Font Awesome 5 Free';
      font-weight: 900;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      background-color: #162238;
      padding: 0 6px;
      color: var(--accent);
      font-size: 14px;
    }

    .pass-details-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-bottom: 20px;
    }

    .detail-item span {
      display: block;
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    .detail-item p {
      font-size: 14px;
      font-weight: 600;
    }

    .pass-food-banner {
      background-color: rgba(56, 189, 248, 0.05);
      border: 1px dashed rgba(56, 189, 248, 0.2);
      border-radius: 8px;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    .pass-food-banner i {
      color: var(--accent);
    }

    /* Отельный ваучер */
    .hotel-voucher {
      background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid var(--border-color);
      box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .voucher-header {
      background: linear-gradient(90deg, #059669 0%, #047857 100%);
      padding: 16px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .voucher-title {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 0.5px;
    }

    .voucher-status {
      font-size: 11px;
      background-color: rgba(255,255,255,0.2);
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
      font-weight: 600;
    }

    .voucher-body {
      padding: 20px;
    }

    .voucher-hotel-main {
      margin-bottom: 16px;
    }

    .voucher-hotel-stars {
      color: #fbbf24;
      font-size: 11px;
      margin-bottom: 4px;
    }

    .voucher-hotel-name {
      font-size: 20px;
      font-weight: 700;
    }

    .voucher-hotel-district {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .voucher-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <div class="logo-icon"><i class="fa-solid fa-jet-fighter"></i></div>
      <div class="logo-text">
        <h1>Sky<span>Gen</span></h1>
      </div>
    </div>
    <div style="font-size: 14px; color: var(--text-muted)">Конструктор комплексных туров • v2.0</div>
  </header>

  <div class="container">
    
    <!-- Панель управления (слева) -->
    <div class="control-panel">
      
      <!-- Поиск и Выбор города -->
      <div class="panel-section">
        <h3><i class="fa-solid fa-map-location-dot"></i> Направление</h3>
        <div class="search-box">
          <i class="fa-solid fa-magnifying-glass"></i>
          <input type="text" id="citySearchInput" placeholder="Поиск города или страны..." oninput="renderCityList()">
        </div>
        <div class="city-list-wrapper" id="cityListContainer">
          <!-- Генерируется из JS -->
        </div>
      </div>

      <!-- Фильтры отелей -->
      <div class="panel-section">
        <h3><i class="fa-solid fa-sliders"></i> Звёздность отелей</h3>
        <div class="filter-btn-group">
          <button class="filter-btn active" data-stars="all" onclick="setStarsFilter('all', this)">
            <i class="fa-solid fa-border-all"></i>Все
          </button>
          <button class="filter-btn" data-stars="⭐⭐⭐⭐⭐" onclick="setStarsFilter('⭐⭐⭐⭐⭐', this)">
            <i class="fa-solid fa-star"></i>5 Звёзд
          </button>
          <button class="filter-btn" data-stars="⭐⭐⭐⭐" onclick="setStarsFilter('⭐⭐⭐⭐', this)">
            <i class="fa-solid fa-star-half-stroke"></i>4 Звезды
          </button>
        </div>
      </div>

      <!-- Кнопка генерации документов -->
      <div class="panel-section" style="margin-top: 40px;">
        <button class="action-btn" id="generateDocBtn" onclick="generatePackage()" disabled>
          <i class="fa-solid fa-wand-magic-sparkles"></i> Сформировать ваучеры
        </button>
      </div>

    </div>

    <!-- Рабочая область (справа) -->
    <div class="workspace" id="mainWorkspace">
      <div class="no-selection">
        <i class="fa-solid fa-plane-departure"></i>
        <h2>Добро пожаловать в SkyGen</h2>
        <p style="margin-top: 10px; font-size: 14px;">Выберите нужный город в левой панели, чтобы начать проектирование вашего путешествия.</p>
      </div>
    </div>

  </div>

  <!-- Подключаем файл с базой данных -->
  <script src="data.js"></script>

  <!-- Основная логика приложения -->
  <script>
    let currentSelectedCity = null;
    let selectedHotelId = null;
    let currentFoodTab = 'mains';
    let starsFilter = 'all';

    // Выбранные элементы питания
    let selectedFood = {
      mains: null,
      sides: null,
      drinks: null,
      desserts: null
    };

    // Массивы для хранения динамически сгенерированных отелей для выбранного города
    let currentHotelsList = [];

    // Инициализация при загрузке страницы
    window.onload = function() {
      renderCityList();
    };

    // Отрисовка списка городов с учетом фильтра поиска
    function renderCityList() {
      const searchValue = document.getElementById('citySearchInput').value.toLowerCase().trim();
      const container = document.getElementById('cityListContainer');
      container.innerHTML = '';

      // Фильтруем города по названию или по стране
      const filteredCities = CITIES.filter(item => 
        item.city.toLowerCase().includes(searchValue) || 
        (item.country && item.country.toLowerCase().includes(searchValue))
      );

      if (filteredCities.length === 0) {
        container.innerHTML = '<div style="padding:16px; font-size:13px; color:var(--text-muted); text-align:center;">Города не найдены</div>';
        return;
      }

      filteredCities.forEach(item => {
        const div = document.createElement('div');
        div.className = `city-item ${currentSelectedCity && currentSelectedCity.city === item.city ? 'active' : ''}`;
        div.onclick = () => selectCity(item);

        div.innerHTML = `
          <div>
            <div class="city-info-main">${item.city}</div>
            <div class="city-country">${item.country || 'Локация'}</div>
          </div>
          <div class="city-code-badge">${item.code}</div>
        `;
        container.appendChild(div);
      });
    }

    // Обработчик выбора города
    function selectCity(cityObj) {
      currentSelectedCity = cityObj;
      selectedHotelId = null;
      
      // Сброс выбранного питания
      selectedFood = { mains: null, sides: null, drinks: null, desserts: null };
      
      // Активируем кнопку генерации
      document.getElementById('generateDocBtn').disabled = false;

      // Обновляем активный класс в списке городов
      renderCityList();
      
      // Генерируем уникальный список отелей именно под этот город
      generateHotelsForCity(cityObj.hotelCount);

      // Строим основной интерфейс шагов справа
      buildWorkspaceUI();
    }

    // Фильтрация отелей по звёздности
    function setStarsFilter(stars, btnElement) {
      starsFilter = stars;
      
      // Смена активного класса на кнопках фильтров
      document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      btnElement.classList.add('active');

      // Перерисовываем сетку отелей, если город уже выбран
      if (currentSelectedCity) {
        renderHotelsGrid();
      }
    }

    // Наполнение отелей из пула под выбранный город
    function generateHotelsForCity(count) {
      currentHotelsList = [];
      
      // Перемешиваем пул названий отелей для случайности
      let shuffledPool = [...HOTEL_NAMES_POOL].sort(() => 0.5 - Math.random());
      
      for(let i = 0; i < Math.min(count, shuffledPool.length); i++) {
        // Выбираем случайный район обитания
        let randomDistrict = HOTEL_DISTRICTS_POOL[Math.floor(Math.random() * HOTEL_DISTRICTS_POOL.length)];
        
        currentHotelsList.push({
          id: 'hotel_' + i,
          name: shuffledPool[i].name,
          stars: shuffledPool[i].stars,
          price: shuffledPool[i].price,
          img: shuffledPool[i].img,
          district: randomDistrict
        });
      }
    }

    // Сборка интерфейса конструирования тура справа
    function buildWorkspaceUI() {
      const workspace = document.getElementById('mainWorkspace');
      workspace.innerHTML = '';

      // 1. Шапка выбранного города
      const cityHeader = document.createElement('div');
      cityHeader.style.backgroundColor = 'var(--bg-secondary)';
      cityHeader.style.padding = '24px';
      cityHeader.style.borderRadius = '16px';
      cityHeader.style.border = '1px solid var(--border-color)';
      cityHeader.style.display = 'flex';
      cityHeader.style.justifyContent = 'space-between';
      cityHeader.style.alignItems = 'center';
      
      cityHeader.innerHTML = `
        <div>
          <h2 style="font-size:26px; font-weight:700;">${currentSelectedCity.city}</h2>
          <p style="color:var(--text-muted); font-size:14px; margin-top:4px;">
            <i class="fa-solid fa-earth-americas"></i> ${currentSelectedCity.country} &nbsp;|&nbsp; 
            <i class="fa-solid fa-clock"></i> Часовой пояс: ${currentSelectedCity.timezone}
          </p>
        </div>
        <div style="font-size: 20px; font-weight: 600; background: var(--bg-primary); padding: 10px 18px; border-radius: 10px; border: 1px solid var(--border-color);">
          ${currentSelectedCity.weather}
        </div>
      `;
      workspace.appendChild(cityHeader);

      // 2. Секция Достопримечательностей (если они прописаны в базе)
      if (currentSelectedCity.sights && currentSelectedCity.sights.length > 0) {
        const sightsContainer = document.createElement('div');
        sightsContainer.className = 'sights-box';
        sightsContainer.innerHTML = `
          <div class="section-title"><i class="fa-solid fa-camera-retro"></i> Популярные места</div>
          <div class="sights-list">
            ${currentSelectedCity.sights.map(sight => `
              <div class="sight-item-card">
                <div class="sight-icon-wrapper"><i class="fa-solid fa-monument"></i></div>
                <div>
                  <div class="sight-text-title">${sight}</div>
                  <div class="sight-text-desc">Рекомендуется посетить</div>
                </div>
              </div>
            `).join('')}
          </div>
        `;
        workspace.appendChild(sightsContainer);
      }

      // 3. Контейнер выбора отелей
      const hotelsSection = document.createElement('div');
      hotelsSection.innerHTML = `
        <div class="section-title"><i class="fa-solid fa-hotel"></i> Шаг 1: Выберите отель для проживания</div>
        <div class="hotels-grid" id="hotelsGridContainer"></div>
      `;
      workspace.appendChild(hotelsSection);
      renderHotelsGrid();

      // 4. Конструктор еды на борту самолета
      const foodSection = document.createElement('div');
      foodSection.className = 'food-constructor-box';
      foodSection.innerHTML = `
        <div class="section-title"><i class="fa-solid fa-utensils"></i> Шаг 2: Настройте персональное меню на рейсе</div>
        <div class="food-tabs">
          <button class="food-tab-btn active" id="tab_mains" onclick="switchFoodTab('mains')">Горячее</button>
          <button class="food-tab-btn" id="tab_sides" onclick="switchFoodTab('sides')">Гарниры</button>
          <button class="food-tab-btn" id="tab_drinks" onclick="switchFoodTab('drinks')">Напитки</button>
          <button class="food-tab-btn" id="tab_desserts" onclick="switchFoodTab('desserts')">Десерты</button>
        </div>
        <div class="food-items-grid" id="foodGridContainer"></div>
      `;
      workspace.appendChild(foodSection);
      renderFoodGrid();
    }

    // Отрисовка сетки отелей с учетом фильтрации звёзд
    function renderHotelsGrid() {
      const container = document.getElementById('hotelsGridContainer');
      if(!container) return;
      container.innerHTML = '';

      const filtered = starsFilter === 'all' 
        ? currentHotelsList 
        : currentHotelsList.filter(h => h.stars === starsFilter);

      if(filtered.length === 0) {
        container.innerHTML = '<div style="grid-column: 1/-1; padding: 30px; text-align:center; color:var(--text-muted);">Нет отелей, соответствующих выбранной звездности</div>';
        return;
      }

      filtered.forEach(hotel => {
        const card = document.createElement('div');
        card.className = `hotel-card ${selectedHotelId === hotel.id ? 'selected' : ''}`;
        card.onclick = () => {
          selectedHotelId = hotel.id;
          renderHotelsGrid();
        };

        card.innerHTML = `
          <div class="hotel-img-wrapper">
            <img src="${hotel.img}" alt="${hotel.name}">
            <div class="hotel-price-badge">${hotel.price.toLocaleString()} ₽ / ночь</div>
          </div>
          <div class="hotel-content">
            <div class="hotel-stars">${hotel.stars}</div>
            <div class="hotel-name" title="${hotel.name}header">${hotel.name}</div>
            <div class="hotel-district"><i class="fa-solid fa-location-dot"></i> ${hotel.district}</div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Переключение вкладок меню еды
    function switchFoodTab(tabName) {
      currentFoodTab = tabName;
      document.querySelectorAll('.food-tab-btn').forEach(btn => btn.classList.remove('active'));
      document.getElementById(`tab_${tabName}`).classList.add('active');
      renderFoodGrid();
    }

    // Отрисовка блюд текущей вкладки питания
    function renderFoodGrid() {
      const container = document.getElementById('foodGridContainer');
      if(!container) return;
      container.innerHTML = '';

      const items = FOOD_MENU_OPTIONS[currentFoodTab];
      
      items.forEach(foodItem => {
        const isSelected = selectedFood[currentFoodTab] && selectedFood[currentFoodTab].id === foodItem.id;
        const card = document.createElement('div');
        card.className = `food-card ${isSelected ? 'selected' : ''}`;
        card.onclick = () => {
          // Если кликаем по уже выбранному — снимаем выбор, иначе перезаписываем раздел
          selectedFood[currentFoodTab] = isSelected ? null : foodItem;
          renderFoodGrid();
        };

        card.innerHTML = `
          <img src="${foodItem.img}" class="food-card-img" alt="${foodItem.name}">
          <div class="food-card-body">
            ${foodItem.type ? `<div class="food-card-type">${foodItem.type}</div>` : ''}
            <div class="food-card-name">${foodItem.name}</div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    // Финальная сборка тур-пакета и рендеринг официальных документов (Авиабилет + Ваучер)
    function generatePackage() {
      const workspace = document.getElementById('mainWorkspace');
      
      // Находим объект выбранного отеля в текущем списке
      const hotelObj = currentHotelsList.find(h => h.id === selectedHotelId);
      if(!hotelObj) {
        alert('Пожалуйста, выберите отель перед генерацией документов!');
        return;
      }

      // Формируем строчки выбранной еды
      let foodSummary = [];
      if(selectedFood.mains) foodSummary.push(selectedFood.mains.name);
      if(selectedFood.sides) foodSummary.push(selectedFood.sides.name);
      if(selectedFood.drinks) foodSummary.push(selectedFood.drinks.name);
      if(selectedFood.desserts) foodSummary.push(selectedFood.desserts.name);
      
      const foodText = foodSummary.length > 0 ? foodSummary.join(', ') : 'Стандартное меню на борту не изменено';

      // Генерируем случайную авиакомпанию и данные рейса
      const randomAirline = AIRLINES[Math.floor(Math.random() * AIRLINES.length)];
      const randomFlightNum = Math.floor(100 + Math.random() * 899);
      const randomSeat = Math.floor(1 + Math.random() * 29) + String.fromCharCode(65 + Math.floor(Math.random() * 6)); // Например: 14C

      // Очищаем и выводим итоговую страницу документов
      workspace.innerHTML = `
        <div class="section-title" style="font-size:24px; color:var(--success)">
          <i class="fa-solid fa-circle-check"></i> Документы успешно сформированы!
        </div>
        
        <div class="documents-layout">
          
          <!-- АВИАПОСАДОЧНЫЙ ТАЛОН -->
          <div class="boarding-pass">
            <div class="pass-header">
              <div class="pass-airline"><i class="fa-solid fa-plane"></i> ${randomAirline}</div>
              <div class="pass-class">Business Class</div>
            </div>
            <div class="pass-body">
              <div class="pass-flight-path">
                <div class="path-point">
                  <h2>MOW</h2>
                  <p>Москва, RU</p>
                </div>
                <div class="path-connector">
                  <div style="font-size:11px; color:var(--accent); margin-bottom:4px;">Рейс №${randomFlightNum}</div>
                  <div class="path-line"></div>
                </div>
                <div class="path-point" style="text-align: right;">
                  <h2>${currentSelectedCity.code}</h2>
                  <p>${currentSelectedCity.city}, ${currentSelectedCity.country || ''}</p>
                </div>
              </div>
              
              <div class="pass-details-grid">
                <div class="detail-item">
                  <span>Вылет</span>
                  <p>Завтра, 08:45</p>
                </div>
                <div class="detail-item">
                  <span>Место</span>
                  <p>${randomSeat}</p>
                </div>
                <div class="detail-item">
                  <span>Гейт</span>
                  <p>A-${Math.floor(1 + Math.random() * 18)}</p>
                </div>
              </div>

              <div class="pass-food-banner">
                <i class="fa-solid fa-tray-substring fa-hamburger"></i>
                <div>
                  <strong style="display:block; font-size:11px; color:var(--accent);">Выбранное меню:</strong>
                  <span style="font-size:12px; color:var(--text-main);">${foodText}</span>
                </div>
              </div>
            </div>
          </div>

          <!-- ОТЕЛЬНЫЙ ВАУЧЕР -->
          <div class="hotel-voucher">
            <div class="voucher-header">
              <div class="voucher-title"><i class="fa-solid fa-hotel"></i> Отельный Ваучер</div>
              <div class="voucher-status">Подтверждено</div>
            </div>
            <div class="voucher-body">
              <div class="voucher-hotel-main">
                <div class="voucher-hotel-stars">${hotelObj.stars}</div>
                <div class="voucher-hotel-name">${hotelObj.name}</div>
                <div class="voucher-hotel-district"><i class="fa-solid fa-location-dot"></i> ${hotelObj.district}</div>
              </div>
              
              <div class="voucher-grid" style="border-top: 1px solid var(--border-color); padding-top:16px;">
                <div class="detail-item">
                  <span>Тип размещения</span>
                  <p>Standard Luxury Room</p>
                </div>
                <div class="detail-item">
                  <span>Питание</span>
                  <p>Завтрак включён (BB)</p>
                </div>
                <div class="detail-item" style="margin-top:10px;">
                  <span>Длительность</span>
                  <p>7 Ночей / 8 Дней</p>
                </div>
                <div class="detail-item" style="margin-top:10px;">
                  <span>Статус оплаты</span>
                  <p style="color:var(--success)">Оплачено полностью</p>
                </div>
              </div>
            </div>
          </div>

        </div>

        <button class="action-btn" style="background:var(--bg-secondary); color:var(--text-main); border:1px solid var(--border-color); margin-top:20px; width:fit-content; padding:12px 24px;" onclick="selectCity(currentSelectedCity)">
          <i class="fa-solid fa-arrow-left"></i> Вернуться к редактированию
        </button>
      `;
    }
  </script>
</body>
</html>
