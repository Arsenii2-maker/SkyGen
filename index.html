<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SKYGEN — Генератор билетов</title>
  
  <!-- Подключаем Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Подключаем React, ReactDOM и Babel -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Подключаем библиотеку для скачивания билета в галерею -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body class="bg-gray-50 text-slate-800 font-sans antialiased">

  <div id="root"></div>

  <script type="text/babel">
    
    // === РАСШИРЕННАЯ БАЗА ГОРОДОВ (20 МЕГАПОЛИСОВ) ===
    const CITIES = [
      { city: "Москва", code: "SVO" },
      { city: "Дубай", code: "DXB" },
      { city: "Нью-Йорк", code: "JFK" },
      { city: "Лондон", code: "LHR" },
      { city: "Токио", code: "HND" },
      { city: "Париж", code: "CDG" },
      { city: "Стамбул", code: "IST" },
      { city: "Бангкок", code: "BKK" },
      { city: "Сеул", code: "ICN" },
      { city: "Сингапур", code: "SIN" },
      { city: "Лос-Анджелес", code: "LAX" },
      { city: "Рим", code: "FCO" },
      { city: "Барселона", code: "BCN" },
      { city: "Берлин", code: "BER" },
      { city: "Сидней", code: "SYD" },
      { city: "Шанхай", code: "PVG" },
      { city: "Каир", code: "CAI" },
      { city: "Рио-де-Жанейро", code: "GIG" },
      { city: "Дели", code: "DEL" },
      { city: "Мальдивы", code: "MLE" }
    ];

    const AIRLINES = ["SkyGen Airlines", "Oceanic Air", "Global Jet", "AeroNomad"];

    // === СЛУЖЕБНЫЕ ИКОНКИ ===
    const IconPlane = () => <svg className="w-6 h-6 inline" fill="currentColor" viewBox="0 0 24 24"><path d="M21 16V14L13 9V3.5A1.5 1.5 0 0 0 11.5 2A1.5 1.5 0 0 0 10 3.5V9L2 14V16L10 13.5V19L8 20.5V22L11.5 21L15 22V20.5L13 19V13.5L21 16Z"/></svg>;
    const IconArrow = () => <svg className="w-5 h-5 inline" fill="none" stroke="currentColor" strokeWidth="2" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>;

    // === ЛОГИКА ГЕНЕРАЦИИ ===
    const generateFlights = (fromCode, toCode, dateFrom, dateTo) => {
      return Array.from({ length: 6 }).map(() => {
        const durationHours = Math.floor(Math.random() * 8) + 2;
        const durationMins = Math.floor(Math.random() * 60);
        const depHour = Math.floor(Math.random() * 16) + 4;
        const arrHour = (depHour + durationHours) % 24;
        
        return {
          id: Math.random().toString(36).substr(2, 8).toUpperCase(),
          airline: AIRLINES[Math.floor(Math.random() * AIRLINES.length)],
          flightNumber: `SG-${Math.floor(Math.random() * 9000) + 1000}`,
          departure: `${depHour.toString().padStart(2, '0')}:${durationMins.toString().padStart(2, '0')}`,
          arrival: `${arrHour.toString().padStart(2, '0')}:45`,
          duration: `${durationHours}ч ${durationMins}м`,
          price: Math.floor(Math.random() * 65000) + 12000, // Разброс цен стал больше для наглядности фильтра
          from: fromCode,
          to: toCode,
          dateFrom: dateFrom,
          dateTo: dateTo,
          gate: `G${Math.floor(Math.random() * 50) + 1}`,
          seat: `${Math.floor(Math.random() * 30) + 1}${['A','B','C','D','E','F'][Math.floor(Math.random() * 6)]}`
        };
      });
    };

    // === КОМПОНЕНТ ПРИЛОЖЕНИЯ ===
    function App() {
      const [step, setStep] = React.useState('search'); 
      const [sortBy, setSortBy] = React.useState('cheap'); // Сортировка: 'cheap' или 'expensive'
      const [params, setParams] = React.useState({
        from: 'SVO',
        to: 'DXB',
        dateFrom: new Date().toISOString().split('T')[0],
        dateTo: new Date(Date.now() + 7 * 24 * 60 * 60 * 1000).toISOString().split('T')[0], // По умолчанию +7 дней
        passengers: 1,
        flightClass: 'Эконом',
        baggage: true,
        pet: false
      });
      const [flights, setFlights] = React.useState([]);
      const [selectedFlight, setSelectedFlight] = React.useState(null);
      const [passengerName, setPassengerName] = React.useState('NYASHIK');
      
      const ticketRef = React.useRef(null);

      const handleSearch = (e) => {
        e.preventDefault();
        if (params.from === params.to) {
          alert("Выберите разные города!");
          return;
        }
        if (new Date(params.dateFrom) > new Date(params.dateTo)) {
          alert("Дата обратно не может быть раньше даты вылета!");
          return;
        }
        setFlights(generateFlights(params.from, params.to, params.dateFrom, params.dateTo));
        setStep('results');
      };

      const handleDownloadTicket = async () => {
        if (!ticketRef.current) return;
        const canvas = await html2canvas(ticketRef.current, { scale: 2 });
        const link = document.createElement('a');
        link.download = `Ticket_${selectedFlight.flightNumber}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      };

      // Логика сортировки билетов
      const sortedFlights = [...flights].sort((a, b) => {
        return sortBy === 'cheap' ? a.price - b.price : b.price - a.price;
      });

      return (
        <div className="min-h-screen flex flex-col">
          {/* ШАПКА */}
          <header className="bg-[#0057b8] text-white py-4 px-6 shadow-md flex items-center justify-between">
            <div className="flex items-center gap-2 text-xl font-bold tracking-wider cursor-pointer" onClick={() => setStep('search')}>
              <IconPlane />
              <span>SKYGEN</span>
            </div>
          </header>

          <main className="max-w-4xl mx-auto w-full py-6 px-4 flex-1">
            
            {/* ЭКРАН 1: ФОРМА ПОИСКА */}
            {step === 'search' && (
              <div className="bg-white p-6 rounded-2xl shadow-lg border border-gray-100">
                <h1 className="text-2xl font-bold mb-6 text-[#0057b8]">Поиск авиабилетов</h1>
                <form onSubmit={handleSearch} className="space-y-4">
                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                      <label className="text-xs font-bold text-gray-400 block mb-1">Откуда</label>
                      <select value={params.from} onChange={e => setParams({...params, from: e.target.value})} className="w-full p-3 border rounded-xl bg-white outline-none">
                        {CITIES.map(c => <option key={c.code} value={c.code}>{c.city} ({c.code})</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="text-xs font-bold text-gray-400 block mb-1">Куда</label>
                      <select value={params.to} onChange={e => setParams({...params, to: e.target.value})} className="w-full p-3 border rounded-xl bg-white outline-none">
                        {CITIES.map(c => <option key={c.code} value={c.code}>{c.city} ({c.code})</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="text-xs font-bold text-gray-400 block mb-1">Туда</label>
                      <input type="date" value={params.dateFrom} onChange={e => setParams({...params, dateFrom: e.target.value})} className="w-full p-3 border rounded-xl outline-none" />
                    </div>
                    <div>
                      <label className="text-xs font-bold text-gray-400 block mb-1">Обратно</label>
                      <input type="date" value={params.dateTo} onChange={e => setParams({...params, dateTo: e.target.value})} className="w-full p-3 border rounded-xl outline-none" />
                    </div>
                    <div>
                      <label className="text-xs font-bold text-gray-400 block mb-1">Класс обслуживания</label>
                      <select value={params.flightClass} onChange={e => setParams({...params, flightClass: e.target.value})} className="w-full p-3 border rounded-xl bg-white outline-none">
                        <option>Эконом</option>
                        <option>Бизнес</option>
                      </select>
                    </div>
                    <div>
                      <label className="text-xs font-bold text-gray-400 block mb-1">Пассажиры</label>
                      <input type="number" min="1" max="9" value={params.passengers} onChange={e => setParams({...params, passengers: e.target.value})} className="w-full p-3 border rounded-xl outline-none" />
                    </div>
                  </div>

                  <div className="flex gap-4 pt-2 border-t border-gray-50 text-sm">
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" checked={params.baggage} onChange={e => setParams({...params, baggage: e.target.checked})} className="w-4 h-4 accent-[#0057b8]" />
                      <span>Багаж включен</span>
                    </label>
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" checked={params.pet} onChange={e => setParams({...params, pet: e.target.checked})} className="w-4 h-4 accent-[#0057b8]" />
                      <span>С питомцем</span>
                    </label>
                  </div>

                  <button type="submit" className="w-full bg-[#0057b8] text-white font-bold py-3.5 rounded-xl text-md shadow-md active:scale-[0.98] transition-all">
                    Найти билеты
                  </button>
                </form>
              </div>
            )}

            {/* ЭКРАН 2: РЕЗУЛЬТАТЫ ПОИСКА С ФИЛЬТРОМ */}
            {step === 'results' && (
              <div className="space-y-4">
                <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2 mb-2">
                  <button onClick={() => setStep('search')} className="text-[#0057b8] text-sm font-semibold self-start">
                    ← Назад к поиску
                  </button>
                  
                  {/* Выпадающий список сортировки по цене */}
                  <div className="flex items-center gap-2 self-end sm:self-auto">
                    <label className="text-xs font-bold text-gray-400">Сортировка:</label>
                    <select 
                      value={sortBy} 
                      onChange={e => setSortBy(e.target.value)} 
                      className="p-2 border rounded-xl bg-white text-xs font-semibold outline-none text-[#0057b8] cursor-pointer"
                    >
                      <option value="cheap">Сначала дешёвые</option>
                      <option value="expensive">Сначала дорогие</option>
                    </select>
                  </div>
                </div>

                <h2 className="text-xl font-bold">Доступные рейсы: {params.from} <IconArrow /> {params.to}</h2>
                
                {sortedFlights.map(flight => (
                  <div key={flight.id} className="bg-white p-5 rounded-xl shadow-sm border border-gray-200 flex flex-col justify-between gap-4">
                    <div className="flex justify-between items-center text-xs font-bold text-gray-400">
                      <span>{flight.airline}</span>
                      <span>{flight.flightNumber}</span>
                    </div>
                    <div className="flex justify-between items-center">
                      <div>
                        <div className="text-2xl font-bold text-slate-800">{flight.departure}</div>
                        <div className="text-xs text-gray-500">{flight.from}</div>
                      </div>
                      <div className="text-center flex-1 px-4 text-xs text-gray-400">
                        <div>{flight.duration}</div>
                        <div className="h-px bg-gray-200 my-1 relative"></div>
                        <div className="text-[10px] text-slate-500">{flight.dateFrom} — {flight.dateTo}</div>
                      </div>
                      <div className="text-right">
                        <div className="text-2xl font-bold text-slate-800">{flight.arrival}</div>
                        <div className="text-xs text-gray-500">{flight.to}</div>
                      </div>
                    </div>
                    <div className="flex justify-between items-center pt-3 border-t border-gray-50">
                      <span className="text-xl font-extrabold text-[#0057b8]">{flight.price.toLocaleString('ru-RU')} ₽</span>
                      <button onClick={() => { setSelectedFlight(flight); setStep('ticket'); }} className="bg-[#0057b8] text-white px-5 py-2 rounded-lg font-bold text-sm">
                        Выбрать
                      </button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* ЭКРАН 3: ГОТОВЫЙ БИЛЕТ */}
            {step === 'ticket' && selectedFlight && (
              <div className="flex flex-col items-center">
                <button onClick={() => setStep('results')} className="text-[#0057b8] text-sm font-semibold mb-4 self-start">
                  ← К списку рейсов
                </button>

                <div className="w-full bg-white p-4 rounded-xl border mb-6">
                  <label className="text-xs font-bold text-gray-400 block mb-1">Имя пассажира латиницей:</label>
                  <input type="text" value={passengerName} onChange={(e) => setPassengerName(e.target.value.toUpperCase())} className="w-full p-2 border rounded font-mono uppercase outline-none focus:border-[#0057b8]" />
                </div>

                {/* БИЛЕТ ДЛЯ СОХРАНЕНИЯ */}
                <div ref={ticketRef} className="bg-white rounded-2xl shadow-xl overflow-hidden w-full border border-gray-300 max-w-md">
                  <div className="bg-[#0057b8] text-white p-4 flex justify-between items-center">
                    <span className="font-bold tracking-wider">{selectedFlight.airline}</span>
                    <span className="text-xs border px-2 py-0.5 rounded font-mono">BOARDING PASS</span>
                  </div>
                  
                  <div className="p-5 space-y-4">
                    <div className="flex justify-between border-b pb-3">
                      <div>
                        <div className="text-[10px] uppercase text-gray-400 font-bold">Passenger</div>
                        <div className="font-mono font-bold text-lg">{passengerName || 'NYASHIK'}</div>
                      </div>
                      <div className="text-right">
                        <div className="text-[10px] uppercase text-gray-400 font-bold">Flight</div>
                        <div className="font-mono font-bold text-lg">{selectedFlight.flightNumber}</div>
                      </div>
                    </div>

                    <div className="flex justify-between items-center py-2">
                      <div>
                        <div className="text-4xl font-black">{selectedFlight.from}</div>
                        <div className="text-[10px] text-gray-400 font-bold">Вылет {selectedFlight.departure}</div>
                      </div>
                      <div className="text-gray-300">➔</div>
                      <div className="text-right">
                        <div className="text-4xl font-black">{selectedFlight.to}</div>
                        <div className="text-[10px] text-gray-400 font-bold">Прилет {selectedFlight.arrival}</div>
                      </div>
                    </div>

                    <div className="grid grid-cols-3 gap-2 bg-gray-50 p-3 rounded-xl text-center text-sm border">
                      <div>
                        <div className="text-[9px] text-gray-400 font-bold uppercase">Даты рейса</div>
                        <div className="font-bold text-[10px] leading-tight">{selectedFlight.dateFrom}</div>
                        <div className="font-bold text-[10px] leading-tight">{selectedFlight.dateTo}</div>
                      </div>
                      <div>
                        <div className="text-[9px] text-gray-400 font-bold uppercase">Выход</div>
                        <div className="font-bold">{selectedFlight.gate}</div>
                      </div>
                      <div>
                        <div className="text-[9px] text-gray-400 font-bold uppercase">Место</div>
                        <div className="font-bold font-mono text-[#0057b8]">{selectedFlight.seat}</div>
                      </div>
                    </div>

                    <div className="flex justify-between items-center pt-2 text-[10px] font-bold text-gray-400">
                      <div>КЛАСС: {params.flightClass.toUpperCase()}</div>
                      <div>{params.baggage ? '✓ БАГАЖ' : ''} {params.pet ? '• С ПИТОМЦЕМ' : ''}</div>
                    </div>

                    {/* Имитация штрих-кода */}
                    <div className="pt-4 border-t border-dashed flex flex-col items-center justify-center">
                      <div className="w-full h-10 bg-slate-900 tracking-[10px] text-white text-center flex items-center justify-center font-mono text-xs opacity-80 rounded">
                        ||||| | |||| || ||||| ||| | ||||
                      </div>
                      <span className="text-[9px] text-gray-400 font-mono mt-1">PNR: {selectedFlight.id}</span>
                    </div>
                  </div>
                </div>

                <button onClick={handleDownloadTicket} className="mt-6 w-full bg-[#0057b8] text-white font-bold py-3.5 rounded-xl shadow-lg active:scale-95 transition-all text-center">
                  💾 Сохранить в галерею (PNG)
                </button>
              </div>
            )}
          </main>
        </div>
      );
    }

    // Рендерим приложение
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
